name: Test

on:
  push:
    branches: [main]
  pull_request:

# Only the unit suite runs in CI. Integration tests hit a real Penpot instance
# (see test/integration/) and are intentionally not run here — they're a local/
# manual verification tool (`npm run test:integration`), not a CI gate.
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - run: npm ci

      - run: npm run typecheck
      - run: npm run typecheck:test
      - run: npm test
